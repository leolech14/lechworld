<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LechWorld API Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        h1, h2 {
            color: #f0f0f0;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #2563eb;
        }
        .response {
            background: #262626;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        .success {
            border-left: 4px solid #10b981;
        }
        .error {
            border-left: 4px solid #ef4444;
        }
        input, select {
            background: #262626;
            color: #e0e0e0;
            border: 1px solid #404040;
            padding: 8px 12px;
            border-radius: 6px;
            margin: 5px;
            font-size: 14px;
        }
        label {
            display: inline-block;
            width: 120px;
            color: #a0a0a0;
        }
        .form-group {
            margin: 10px 0;
        }
        .status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .status.connected {
            background: #065f46;
            color: #10b981;
        }
        .status.disconnected {
            background: #7c2d12;
            color: #f87171;
        }
    </style>
</head>
<body>
    <h1>🛩️ LechWorld API Test Suite</h1>
    
    <div class="container">
        <h2>Server Status</h2>
        <div>
            <span>API Server:</span> 
            <span id="serverStatus" class="status disconnected">Checking...</span>
        </div>
        <div>
            <span>Base URL:</span> 
            <span id="baseUrl">http://localhost:5001</span>
        </div>
    </div>

    <div class="container">
        <h2>Health Check</h2>
        <button onclick="testHealth()">Test Health Endpoint</button>
        <div id="healthResponse" class="response"></div>
    </div>

    <div class="container">
        <h2>Authentication</h2>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="test@example.com">
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="password123">
        </div>
        <div class="form-group">
            <label>Name:</label>
            <input type="text" id="name" value="Test User">
        </div>
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
        <button onclick="getCurrentUser()">Get Current User</button>
        <button onclick="logout()">Logout</button>
        <div id="authResponse" class="response"></div>
    </div>

    <div class="container">
        <h2>Airlines</h2>
        <button onclick="getAirlines()">Get All Airlines</button>
        <div id="airlinesResponse" class="response"></div>
    </div>

    <div class="container">
        <h2>Dashboard</h2>
        <button onclick="getDashboard()">Get Dashboard Stats</button>
        <div id="dashboardResponse" class="response"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5001/api';
        let authToken = null;

        // Check server status on load
        window.onload = () => {
            checkServerStatus();
        };

        async function checkServerStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                if (response.ok) {
                    document.getElementById('serverStatus').textContent = 'Connected';
                    document.getElementById('serverStatus').className = 'status connected';
                } else {
                    document.getElementById('serverStatus').textContent = 'Error';
                    document.getElementById('serverStatus').className = 'status disconnected';
                }
            } catch (error) {
                document.getElementById('serverStatus').textContent = 'Disconnected';
                document.getElementById('serverStatus').className = 'status disconnected';
            }
        }

        async function makeRequest(endpoint, method = 'GET', body = null) {
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                },
                credentials: 'include', // Include cookies for session
            };

            if (body) {
                options.body = JSON.stringify(body);
            }

            if (authToken) {
                options.headers['Authorization'] = `Bearer ${authToken}`;
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, options);
                const data = await response.json();
                return { 
                    ok: response.ok, 
                    status: response.status,
                    data 
                };
            } catch (error) {
                return { 
                    ok: false, 
                    error: error.message 
                };
            }
        }

        function displayResponse(elementId, response) {
            const element = document.getElementById(elementId);
            if (response.ok) {
                element.className = 'response success';
                element.textContent = JSON.stringify(response.data, null, 2);
            } else {
                element.className = 'response error';
                element.textContent = `Error ${response.status || ''}: ${JSON.stringify(response.data || response.error, null, 2)}`;
            }
        }

        async function testHealth() {
            const response = await makeRequest('/health');
            displayResponse('healthResponse', response);
        }

        async function register() {
            const response = await makeRequest('/auth/register', 'POST', {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                name: document.getElementById('name').value
            });
            displayResponse('authResponse', response);
            if (response.ok && response.data.token) {
                authToken = response.data.token;
            }
        }

        async function login() {
            const response = await makeRequest('/auth/login', 'POST', {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            displayResponse('authResponse', response);
            if (response.ok && response.data.token) {
                authToken = response.data.token;
            }
        }

        async function getCurrentUser() {
            const response = await makeRequest('/auth/current');
            displayResponse('authResponse', response);
        }

        async function logout() {
            const response = await makeRequest('/auth/logout', 'POST');
            displayResponse('authResponse', response);
            authToken = null;
        }

        async function getAirlines() {
            const response = await makeRequest('/programs/airlines');
            displayResponse('airlinesResponse', response);
        }

        async function getDashboard() {
            const response = await makeRequest('/dashboard');
            displayResponse('dashboardResponse', response);
        }
    </script>
</body>
</html>
