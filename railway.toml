[build]
builder = "NIXPACKS"
buildCommand = "cd apps/api && npm install && npm run build"
watchPatterns = ["apps/api/**"]

[deploy]
startCommand = "cd apps/api && npm run start"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "lechworld-api"